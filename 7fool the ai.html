<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fool the AI</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(to right, #d7d2cc, #304352);
}

/* Inputs */
textarea {
  width: 60%;
  height: 120px;
  font-size: 16px;
  padding: 10px;
}

button {
  margin: 10px;
  padding: 10px 15px;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
}

.result { font-size: 20px; margin-top: 20px; }

/* Modal */
.modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.6);
}

.modal-content {
  background: white;
  padding: 20px;
  margin: 5% auto;
  width: 60%;
  max-height: 70vh;   /* VERY IMPORTANT */
  overflow-y: auto;   /* Enables vertical scroll */
  border-radius: 10px;
}


/* Confetti */
.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  background-color: red;
  top: -10px;
  animation: fall 3s linear forwards;
}

@keyframes fall {
  0% {
    transform: translateY(-10px) translateX(0);
    opacity: 1;
  }
  100% {
    transform: translateY(100vh) translateX(var(--drift));
    opacity: 0;
  }
}
</style>
</head>

<body>

<h1>🎭 Fool the AI</h1>

<p><b> Challenge:</b> Modify the message so the meaning stays the same, but the AI no longer detects it as spam.</p>

<p><b>Original Message:</b></p>
<p>🔥 WIN a FREE iPhone NOW! Click this link!</p>

<textarea id="userInput">
🔥 WIN a FREE iPhone NOW! Click this link!
</textarea>

<br>

<button onclick="classify()">🤖 Run AI</button>
<button onclick="reset()">🔄 Reset</button>

<div class="result" id="result"></div>

<button id="revealBtn" style="display:none;" onclick="reveal1()">🔍 Reveal AI Weakness</button>

<!-- Modal 1 -->
<div class="modal" id="modal1">
  <div class="modal-content">
    <h3>🧠 What Just Happened?</h3>
    <p id="explanation1"></p>
    <button onclick="closeModal1()">Next ➡</button>
  </div>
</div>

<!-- Modal 2 -->
<div class="modal" id="modal2">
  <div class="modal-content">
    <h3>🎓 Course Complete: What You’ve Learned</h3>
    <p id="explanation2"></p>
    <button onclick="closeModal2()">Finish</button>
  </div>
</div>

<script>

// keyword AI
const spamKeywords = ["win","free","click","now","iphone"];

// classify
function classify(){
 let text = document.getElementById("userInput").value.toLowerCase();
 let score = 0;

 spamKeywords.forEach(w=>{
  if(text.includes(w)) score++;
 });

 let result = (score >= 2) ? "🚨 Spam Detected" : "✅ Not Spam";

 document.getElementById("result").innerText = result;
 document.getElementById("revealBtn").style.display="inline";

 if(result === "✅ Not Spam"){
   showWin();
 }
}

// reset
function reset(){
 document.getElementById("userInput").value =
 "🔥 WIN a FREE iPhone NOW! Click this link!";
 document.getElementById("result").innerText="";
 document.getElementById("revealBtn").style.display="none";
}

// modal 1 (activity explanation)
function reveal1(){
 document.getElementById("explanation1").innerHTML = `
 The AI scanned for keywords like <b>"win", "free", and "click"</b>.<br><br>

 ✅ You fooled it by changing words but keeping the meaning.<br><br>

 ⚠️ The AI does NOT understand language; it only matches patterns.<br><br>

 💡 <b>Analogy:</b><br>
 Like a guard checking for specific words, change the wording and you slip through.
 `;
 document.getElementById("modal1").style.display="block";
}

function closeModal1(){
 document.getElementById("modal1").style.display="none";
 reveal2();
}

// modal 2 (course wrap-up)
function reveal2(){

 document.getElementById("explanation2").innerHTML = `
 <b>You’ve just explored how AI really works</b><br><br>

 <b>AI learns from data, not understanding</b><br>
AI doesn’t “think”; it finds patterns based on examples you provide.<br><br>

 <b>Not all intelligent systems learn</b><br>
Some systems follow fixed rules, while others adapt and improve over time.<br><br>

 <b>Design determines performance</b><br>
The right combination of data, model, and goal is what makes AI effective.<br><br>

 <b>AI can reflect hidden bias</b><br>
If the training data has bias, the AI will reproduce it in its decisions.<br><br>

 <b>AI can be fooled</b><br>
Small changes in input can lead to completely different outcomes.<br><br>

🚀 <b>Final Takeaway:</b><br>
AI is powerful, but it doesn’t understand the world like humans do.<br>
It learns patterns, applies them, and can be wrong.<br><br>

 <b>You’re now thinking like an AI engineer.</b>
`;

 document.getElementById("modal2").style.display="block";
 launchConfetti();
}

// close modal 2
function closeModal2(){
 document.getElementById("modal2").style.display="none";
}

// confetti
function launchConfetti(){

  for(let i=0; i<100; i++){

    let c = document.createElement("div");
    c.className = "confetti";

    // random horizontal start
    c.style.left = Math.random() * 100 + "vw";

    // random color
    c.style.backgroundColor = randomColor();

    // random size
    let size = Math.random() * 8 + 6;
    c.style.width = size + "px";
    c.style.height = size + "px";

    // random speed
    let duration = Math.random() * 2 + 2; // 2–4 seconds
    c.style.animationDuration = duration + "s";

    // slight horizontal drift
    let drift = (Math.random() * 100 - 50) + "px";
    c.style.setProperty('--drift', drift);

    document.body.appendChild(c);

    setTimeout(() => c.remove(), 5000);
  }
}


function randomColor(){
 const colors = ["red","blue","yellow","green","orange","purple"];
 return colors[Math.floor(Math.random()*colors.length)];
}

// win popup
function showWin(){
 let msg = document.createElement("div");
 msg.innerText = "🎯 You Fooled the AI!";
 msg.style.position="fixed";
 msg.style.top="40%";
 msg.style.left="50%";
 msg.style.transform="translate(-50%, -50%)";
 msg.style.background="#f4d03f";
 msg.style.padding="20px";
 msg.style.fontSize="24px";
 msg.style.borderRadius="10px";

 document.body.appendChild(msg);
 setTimeout(()=>msg.remove(),2000);
}

</script>
</body>
</html>
