<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BPM Process Simulator</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

h1 { color: #38bdf8; }

#deck {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

.card {
    background: #38bdf8;
    color: black;
    padding: 6px;
    font-size: 12px;
    border-radius: 6px;
    cursor: grab;
    width: 110px;
}

#processBox {
    margin: auto;
    width: 60%;
    min-height: 200px;
    background: #1e293b;
    border: 2px dashed #38bdf8;
    border-radius: 10px;
    padding: 10px;
}

button {
    margin: 10px;
    padding: 10px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

#solveBtn { background: #22c55e; }
#resetBtn { background: #ef4444; }

#modal {
    position: fixed;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #111827;
    padding: 20px;
    border-radius: 10px;
    border: 2px solid #38bdf8;
    display: none;
    width: 320px;
}

.stats {
    margin-top: 15px;
}
</style>
</head>

<body>

<h1>🚀 BPM Process Flow Simulator</h1>

<div id="deck"></div>

<div id="processBox">
    <h3>Drop Steps in Correct Order</h3>
</div>

<button id="solveBtn">✅ Solve</button>
<button id="resetBtn">🔄 Reset</button>

<div class="stats">
⏱ Time: <span id="time">0</span> |
❌ Errors: <span id="errors">0</span> |
⚡ Efficiency: <span id="efficiency">100</span>
</div>

<div id="modal"></div>

<script>
let stepsData = [
    {name:"Enter Order", step:1},
    {name:"Check Inventory", step:2},
    {name:"Verify Payment", step:3},
    {name:"Approve Order", step:4},
    {name:"Pack Item", step:5},
    {name:"Ship Order", step:6}
];

let dragged;
let expectedStep;
let time;
let errors;

/* Initialize */
function init() {
    expectedStep = 1;
    time = 0;
    errors = 0;

    let deck = document.getElementById("deck");
    let box = document.getElementById("processBox");

    deck.innerHTML = "";
    box.innerHTML = "<h3>Drop Steps in Correct Order</h3>";

    shuffle(stepsData);

    stepsData.forEach(item => {
        let card = document.createElement("div");
        card.className = "card";
        card.draggable = true;
        card.dataset.step = item.step;
        card.innerText = item.name;

        card.addEventListener('dragstart', () => dragged = card);
        deck.appendChild(card);
    });

    updateStats();
}

/* Shuffle cards */
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

/* Drop logic */
let box = document.getElementById("processBox");

box.addEventListener('dragover', e => e.preventDefault());

box.addEventListener('drop', () => {
    let step = parseInt(dragged.dataset.step);

    if (step === expectedStep) {
        box.appendChild(dragged);
        expectedStep++;

        showModal("✅ Correct Step", `
            ✔ Proper sequence maintained<br>
            ✔ Dependencies satisfied<br>
            ✔ Process continues smoothly
        `);

        time += 2;

        if (expectedStep > 6) {
            showLessons();
        }

    } else {
        showModal("❌ Process Failure", `
            ✖ Incorrect sequence<br><br>
            <b>Why:</b> Missing required prior step<br>
            <b>Next Required Step:</b> Step ${expectedStep}
        `);

        errors++;
        time += 3;
    }

    updateStats();
});

/* Solve button */
document.getElementById("solveBtn").onclick = () => {
    let box = document.getElementById("processBox");

    stepsData.sort((a,b) => a.step - b.step);

    stepsData.forEach(item => {
        let card = [...document.querySelectorAll(".card")]
            .find(c => parseInt(c.dataset.step) === item.step);
        if (card) box.appendChild(card);
    });

    showModal("✅ Optimal Process Loaded", `
        ✔ Best-practice workflow applied<br>
        ✔ No wasted steps<br>
        ✔ Maximum efficiency achieved
    `);

    expectedStep = 7;
    updateStats();
    showLessons();
};

/* Reset button */
document.getElementById("resetBtn").onclick = init;

/* Lessons learned */
function showLessons() {
    showModal("🎯 Lessons Learned", `
        ✔ Processes must follow logical sequence<br>
        ✔ Skipping steps creates delays and errors<br>
        ✔ Data dependencies drive workflow order<br>
        ✔ Efficient processes reduce cost and time<br><br>
        <b>Key Insight:</b> Good systems enable good decisions.
    `);
}

/* Modal */
function showModal(title, message) {
    let modal = document.getElementById("modal");
    modal.innerHTML = `<h3>${title}</h3><p>${message}</p>`;
    modal.style.display = "block";

    setTimeout(() => {
        modal.style.display = "none";
    }, 4000);
}

/* Stats */
function updateStats() {
    let efficiency = Math.max(0, 100 - (time + errors * 10));

    document.getElementById("time").innerText = time;
    document.getElementById("errors").innerText = errors;
    document.getElementById("efficiency").innerText = efficiency;
}

/* Start game */
init();
</script>

</body>
</html>
