<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Design an AI System</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(to right, #a1c4fd, #c2e9fb);
}

.container {
  display: flex;
  justify-content: space-around;
  margin-top: 20px;
}

.bucket, .slot {
  width: 200px;
  min-height: 180px;
  border: 2px dashed #333;
  border-radius: 10px;
  padding: 10px;
  background: rgba(255,255,255,0.6);
}

.slot {
  height: 120px;
  font-weight: bold;
}

.card {
  padding: 8px;
  margin: 5px;
  background: white;
  border-radius: 8px;
  cursor: grab;
}

/* Modal */
.modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.7);
}

.modal-content {
  background:white;
  padding:20px;
  margin:10% auto;
  width:65%;
  border-radius:10px;
}

button {
  margin:10px;
  padding:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>🧠 Design an AI System</h2>
<p>Drag components to build your system</p>

<div class="container">

<div class="bucket">
<b>📥 DATA</b><br>
<div class="card" draggable="true" data-type="data" data-value="images">📸 Images</div>
<div class="card" draggable="true" data-type="data" data-value="text">📝 Text</div>
<div class="card" draggable="true" data-type="data" data-value="numbers">🔢 Numbers</div>
<div class="card" draggable="true" data-type="data" data-value="voice">🎤 Voice</div>
</div>

<div class="bucket">
<b>⚙️ SYSTEM</b><br>
<div class="card" draggable="true" data-type="system" data-value="ml">🧠 Machine Learning</div>
<div class="card" draggable="true" data-type="system" data-value="rules">⚙️ Rule-Based</div>
</div>

<div class="bucket">
<b>🎯 GOAL</b><br>
<div class="card" draggable="true" data-type="goal" data-value="classify">Classify</div>
<div class="card" draggable="true" data-type="goal" data-value="predict">Predict</div>
<div class="card" draggable="true" data-type="goal" data-value="recommend">Recommend</div>
</div>

</div>

<h3>Build Your Pipeline</h3>
<div class="container">
  <div class="slot" id="dataSlot">Drop DATA</div>
  <div class="slot" id="systemSlot">Drop SYSTEM</div>
  <div class="slot" id="goalSlot">Drop GOAL</div>
</div>

<button onclick="buildSystem()">🚀 Build System</button>
<button onclick="resetAll()">🔄 Reset</button>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h1>📊 System Analysis</h1>
    <p id="result"></p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>

// drag
document.querySelectorAll(".card").forEach(card=>{
 card.addEventListener("dragstart", e=>{
   e.dataTransfer.setData("text", card.outerHTML);
 });
});

// drop
document.querySelectorAll(".slot").forEach(slot=>{
 slot.addEventListener("dragover", e=>e.preventDefault());
 slot.addEventListener("drop", e=>{
   e.preventDefault();
   if(slot.children.length > 0) return;
   const html = e.dataTransfer.getData("text");
   slot.innerHTML = html;
 });
});

// BUILD SYSTEM
function buildSystem(){

 let data=document.querySelector("#dataSlot .card");
 let system=document.querySelector("#systemSlot .card");
 let goal=document.querySelector("#goalSlot .card");

 if(!data || !system || !goal){
   alert("Complete your system first!");
   return;
 }

 let d=data.dataset.value;
 let s=system.dataset.value;
 let g=goal.dataset.value;

 let msg = "";

 // DATA INSIGHT
 let dataInsight = {
  images: " Images contain visual patterns like shapes, faces, and objects.",
  text: " Text contains meaning, context, and language patterns.",
  numbers: " Numbers represent trends, quantities, and measurable values.",
  voice: " Voice contains sound waves, tone, and speech patterns."
 };

 // MODEL INSIGHT
 let modelInsight = {
  ml: " Machine Learning finds patterns in data and improves with experience.",
  rules: " Rule-based systems follow fixed instructions and cannot learn new patterns."
 };

 // GOAL INSIGHT
 let goalInsight = {
  classify: " Classification sorts items into categories (e.g., spam vs not spam).",
  predict: " Prediction estimates future outcomes based on patterns.",
  recommend: " Recommendation suggests items based on user behavior."
 };

 // LOGIC
 let conclusion = "";
 let analogy = "";

 if(s === "ml" && d === "images" && g === "classify"){
  conclusion = "✅ Strong AI System";
  analogy = " Like training a security guard to recognize faces.";
 }

 else if(s === "ml" && d === "text" && g === "recommend"){
  conclusion = "✅ Strong AI System";
  analogy = " Like Netflix learning your movie preferences over time.";
 }

 else if(s === "ml" && g === "predict"){
  conclusion = "✅ Good System";
  analogy = " Like predicting weather using past data trends.";
 }

 else if(s === "rules" && g === "predict"){
  conclusion = "⚠️ Weak System";
  analogy = " Like predicting stock prices using a fixed checklist.";
 }

 else if(s === "rules" && g === "recommend"){
  conclusion = "❌ Poor System Design";
  analogy = " Like recommending movies from a fixed list without learning preferences.";
 }

 else {
  conclusion = "🤔 Mixed System";
  analogy = " Might work, but depends heavily on data quality and design.";
 }

 // FINAL MESSAGE
 msg = `
 <h2 class='conclusion'>${conclusion}</h2><br>

 🔍 <b>Data Insight:</b><br>
 ${dataInsight[d]}<br><br>

 🧠 <b>Model Insight:</b><br>
 ${modelInsight[s]}<br><br>

 🎯 <b>Goal Insight:</b><br>
 ${goalInsight[g]}<br>
 ${analogy}<br><br>

 <b>Key Lesson:</b><br>
 AI systems work best when the data type, model capability, and goal are aligned.<br><br>

 Ask yourself:
 Can this system learn and improve over time? 
 `;

 document.getElementById("result").innerHTML = msg;
 document.getElementById("modal").style.display = "block";
}

// RESET
function resetAll(){
 document.getElementById("dataSlot").innerHTML="Drop DATA";
 document.getElementById("systemSlot").innerHTML="Drop SYSTEM";
 document.getElementById("goalSlot").innerHTML="Drop GOAL";
}

// CLOSE
function closeModal(){
 document.getElementById("modal").style.display="none";
}

</script>
</body>
</html>
