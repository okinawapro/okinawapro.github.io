<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code-a-Maze Adventure</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f4f8;
            color: #333;
        }
        h1 { color: #2c3e50; }
        #game-container {
            display: flex;
            gap: 20px;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        #controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 250px;
        }
        input {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }
        button {
            padding: 10px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #2980b9; }
        .hint { font-size: 0.85em; color: #666; }
        #message {
            margin-top: 10px;
            font-weight: bold;
            min-height: 1.2em;
        }
        #maze-svg {
            background-color: #fff;
            border: 4px solid #2c3e50;
        }
    </style>
</head>
<body>

    <h1>Map the Path! 🗺️</h1>

    <div id="game-container">
        <!-- SVG Maze -->
        <svg id="maze-svg" width="400" height="400" viewBox="0 0 400 400">
            <!-- Walls and paths will be injected here -->
        </svg>

        <!-- UI Controls -->
        <div id="controls">
            <p class="hint">Type commands like: <br><b>right 2</b>, <b>down 1</b>, <b>left 3</b></p>
            <input type="text" id="commandInput" placeholder="Enter command..." autofocus>
            <button onclick="runCommand()">Move!</button>
            <div id="message"></div>
        </div>
    </div>

    <script>
        const GRID_SIZE = 10;
        const CELL_SIZE = 40;
        const svg = document.getElementById('maze-svg');
        const input = document.getElementById('commandInput');
        const msg = document.getElementById('message');

        let playerPos = { x: 0, y: 0 };
        let maze = [];

        // 1. Generate Maze (Depth First Search algorithm)
        function generateMaze() {
            maze = Array.from({ length: GRID_SIZE }, () => 
                Array.from({ length: GRID_SIZE }, () => ({ n: true, s: true, e: true, w: true, visited: false }))
            );

            let stack = [[0, 0]];
            maze[0][0].visited = true;

            while (stack.length > 0) {
                let [x, y] = stack[stack.length - 1];
                let neighbors = [];

                if (y > 0 && !maze[y-1][x].visited) neighbors.push([x, y-1, 'n', 's']);
                if (y < GRID_SIZE-1 && !maze[y+1][x].visited) neighbors.push([x, y+1, 's', 'n']);
                if (x > 0 && !maze[y][x-1].visited) neighbors.push([x-1, y, 'w', 'e']);
                if (x < GRID_SIZE-1 && !maze[y][x+1].visited) neighbors.push([x+1, y, 'e', 'w']);

                if (neighbors.length > 0) {
                    let [nx, ny, dir, opp] = neighbors[Math.floor(Math.random() * neighbors.length)];
                    maze[y][x][dir] = false;
                    maze[ny][nx][opp] = false;
                    maze[ny][nx].visited = true;
                    stack.push([nx, ny]);
                } else {
                    stack.pop();
                }
            }
            renderMaze();
        }

        // 2. Draw the Maze
        function renderMaze() {
            svg.innerHTML = '';
            
            // Draw Exit Zone
            const exit = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            exit.setAttribute("x", (GRID_SIZE - 1) * CELL_SIZE);
            exit.setAttribute("y", (GRID_SIZE - 1) * CELL_SIZE);
            exit.setAttribute("width", CELL_SIZE);
            exit.setAttribute("height", CELL_SIZE);
            exit.setAttribute("fill", "#2ecc71");
            svg.appendChild(exit);

            // Draw Walls
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    const cell = maze[y][x];
                    const px = x * CELL_SIZE;
                    const py = y * CELL_SIZE;

                    if (cell.n) drawLine(px, py, px + CELL_SIZE, py);
                    if (cell.s) drawLine(px, py + CELL_SIZE, px + CELL_SIZE, py + CELL_SIZE);
                    if (cell.e) drawLine(px + CELL_SIZE, py, px + CELL_SIZE, py + CELL_SIZE);
                    if (cell.w) drawLine(px, py, px, py + CELL_SIZE);
                }
            }

            // Draw Character
            const char = document.createElementNS("http://www.w3.org/2000/svg", "text");
            char.setAttribute("id", "player");
            char.setAttribute("x", playerPos.x * CELL_SIZE + 20);
            char.setAttribute("y", playerPos.y * CELL_SIZE + 30);
            char.setAttribute("font-size", "25");
            char.setAttribute("text-anchor", "middle");
            char.textContent = "😟";
            svg.appendChild(char);
        }

        function drawLine(x1, y1, x2, y2) {
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", x1); line.setAttribute("y1", y1);
            line.setAttribute("x2", x2); line.setAttribute("y2", y2);
            line.setAttribute("stroke", "#2c3e50");
            line.setAttribute("stroke-width", "2");
            svg.appendChild(line);
        }

        // 3. Logic to move character
        async function runCommand() {
            const val = input.value.toLowerCase().trim();
            input.value = '';
            const parts = val.split(' ');
            const dir = parts[0];
            const steps = parseInt(parts[1]) || 1;

            if (!['up', 'down', 'left', 'right'].includes(dir)) {
                msg.textContent = "❌ Unknown command!";
                return;
            }

            for (let i = 0; i < steps; i++) {
                if (canMove(dir)) {
                    if (dir === 'up') playerPos.y--;
                    if (dir === 'down') playerPos.y++;
                    if (dir === 'left') playerPos.x--;
                    if (dir === 'right') playerPos.x++;
                    
                    updatePlayerPosition();
                    await new Promise(r => setTimeout(r, 200)); // Animation delay
                } else {
                    msg.textContent = "💥 Ouch! You hit a wall.";
                    return;
                }
            }
            
            checkWin();
        }

        function canMove(dir) {
            const cell = maze[playerPos.y][playerPos.x];
            if (dir === 'up' && !cell.n) return true;
            if (dir === 'down' && !cell.s) return true;
            if (dir === 'left' && !cell.w) return true;
            if (dir === 'right' && !cell.e) return true;
            return false;
        }

        function updatePlayerPosition() {
            const char = document.getElementById('player');
            char.setAttribute("x", playerPos.x * CELL_SIZE + 20);
            char.setAttribute("y", playerPos.y * CELL_SIZE + 30);
            msg.textContent = "";
        }

        function checkWin() {
            if (playerPos.x === GRID_SIZE - 1 && playerPos.y === GRID_SIZE - 1) {
                document.getElementById('player').textContent = "😊";
                msg.style.color = "#2ecc71";
                msg.textContent = "🎉 YOU MADE IT!";
            }
        }

        // Support Enter Key
        input.addEventListener("keyup", (event) => {
            if (event.key === "Enter") runCommand();
        });

        generateMaze();
    </script>
</body>
</html>
