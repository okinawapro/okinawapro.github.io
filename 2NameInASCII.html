<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ASCII Name Challenge</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f9fafb;
      color: #1f2937;
      padding: 40px;
    }

    .container {
      max-width: 1000px;
    }

    h1 {
      margin-bottom: 10px;
    }

    h2 {
      margin-top: 40px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      background: white;
      margin-top: 15px;
      font-size: 0.9em;
    }

    th, td {
      border: 1px solid #d1d5db;
      padding: 6px;
      text-align: center;
    }

    th {
      background: #f3f4f6;
      position: sticky;
      top: 0;
    }

    label {
      display: block;
      margin-top: 20px;
      font-weight: bold;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      font-size: 1.1em;
      margin-top: 6px;
    }

    .binary {
      font-family: monospace;
      letter-spacing: 2px;
    }

    button {
      margin-top: 25px;
      padding: 12px 20px;
      font-size: 1em;
      margin-right: 10px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
    }

    .check {
      background-color: #3b82f6;
      color: white;
    }

    .reset {
      background-color: #e5e7eb;
    }

    .result {
      margin-top: 10px;
      font-style: italic;
      color: #065f46;
    }

    /* Smiley animation */
    .smiley {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.2);
      font-size: 5rem;
      opacity: 0;
      pointer-events: none;
    }

    .smiley.animate {
      animation: growSmile 3s ease forwards;
    }

    @keyframes growSmile {
      0% {
        transform: translate(-50%, -50%) scale(0.2);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      80% {
        transform: translate(-50%, -50%) scale(1.8);
        opacity: 1;
      }
      100% {
        transform: translate(-50%, -50%) scale(2.2);
        opacity: 0;
      }
    }

    .ascii-wrapper {
      max-height: 350px;
      overflow-y: scroll;
      border: 1px solid #d1d5db;
      background: white;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>ASCII Name Challenge</h1>

  <p>
    Computers do not store letters — they store numbers. Use the ASCII table
    below as a reference to convert your name into numbers and binary.
  </p>

  <h2>ASCII Reference Table (0–127)</h2>
  <div class="ascii-wrapper">
    <table>
      <tr>
        <th>Decimal</th>
        <th>Character</th>
        <th>Binary</th>
      </tr>

<script>
for (let i = 0; i < 128; i++) {
  let char =
    (i < 32 || i === 127) ? "Control" : String.fromCharCode(i);
  let binary = i.toString(2).padStart(8, "0");

  document.write(
    `<tr>
      <td>${i}</td>
      <td>${char}</td>
      <td>${binary}</td>
    </tr>`
  );
}
</script>

    </table>
  </div>

  <h2>Try It Yourself</h2>

  <label>1️⃣ Your Name</label>
  <input id="nameInput" type="text" placeholder="e.g., Pete">

  <label>2️⃣ ASCII (Decimal Values)</label>
  <input id="decimalInput" type="text" placeholder="e.g., 80 101 116 101">
  <div id="decimalResult" class="result"></div>

  <label>3️⃣ ASCII (Binary – 8‑bit Octets)</label>
  <input id="binaryInput" class="binary" type="text"
         placeholder="e.g., 01010000 01100101 01110100 01100101">
  <div id="binaryResult" class="result"></div>

  <button class="check" onclick="checkASCII()">Check</button>
  <button class="reset" onclick="resetAll()">Reset</button>
</div>

<div id="smiley" class="smiley">😊</div>

<script>
function checkASCII() {
  const name = document.getElementById("nameInput").value;
  const decimals = document.getElementById("decimalInput").value.trim().split(" ");
  const binaries = document.getElementById("binaryInput").value.trim().split(" ");

  let decodedFromDecimal = "";
  let decodedFromBinary = "";

  decimals.forEach(d => {
    if (!isNaN(d) && d !== "") {
      decodedFromDecimal += String.fromCharCode(parseInt(d, 10));
    }
  });

  binaries.forEach(b => {
    if (/^[01]{8}$/.test(b)) {
      decodedFromBinary += String.fromCharCode(parseInt(b, 2));
    }
  });

  document.getElementById("decimalResult").textContent =
    `Decimal creates: "${decodedFromDecimal}"`;

  document.getElementById("binaryResult").textContent =
    `Binary creates: "${decodedFromBinary}"`;

  if (decodedFromDecimal === name && decodedFromBinary === name) {
    showSmiley();
  }
}

function showSmiley() {
  const smiley = document.getElementById("smiley");
  smiley.classList.remove("animate");
  void smiley.offsetWidth;
  smiley.classList.add("animate");

  setTimeout(() => {
    smiley.classList.remove("animate");
  }, 3000);
}

function resetAll() {
  ["nameInput", "decimalInput", "binaryInput"].forEach(id => {
    document.getElementById(id).value = "";
  });
  document.getElementById("decimalResult").textContent = "";
  document.getElementById("binaryResult").textContent = "";
}
</script>

</body>
</html>
