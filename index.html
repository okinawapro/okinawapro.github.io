<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RafaelT - Class Activities – HTML Index</title>

<style>
  body {
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background: linear-gradient(135deg, #de741c, #b23afc);
    margin: 0;
    padding: 24px;
    color: #1f2937;
  }

  h1 {
    text-align: center;
    margin-bottom: 8px;
  }

  p {
    text-align: center;
    margin-bottom: 24px;
  }

  .card {
    max-width: 720px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  }

  ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  li {
    margin: 10px 0;
  }

  a {
    display: block;
    padding: 12px 16px;
    background: #2563eb;
    color: white;
    text-decoration: none;
    border-radius: 12px;
    font-weight: 600;
    transition: transform 0.1s ease, background 0.2s ease;
  }

  a:hover {
    background: #1d4ed8;
    transform: translateY(-1px);
  }

  .loading {
    text-align: center;
    font-weight: bold;
  }

  .error {
    color: #b91c1c;
    text-align: center;
    font-weight: bold;
  }
  details {
    margin: 12px 0;
  }

  summary {
    cursor: pointer;
    list-style: none;
    padding: 10px 14px;
    background: #f3f4f6;
    border-radius: 10px;
    font-weight: 700;
  }

  .dir-list a {
    display: block;
    padding: 8px 12px;
    margin: 6px 0;
    background: #e5e7eb;
    color: #0f172a;
    border-radius: 8px;
    text-decoration: none;
  }

  .dir-list a:hover { background: #d1d5db; }
</style>
</head>

<body>

<h1>Rafael's Class Activities</h1>
<p>These are activities from my IFSM201 class.  We do them in class but remain available online to use on your own time. </p>

  <div class="card">
  <div id="status" class="loading">Loading pages…</div>
  <div id="list"></div>
</div>

  <div>
    <p>All of these files were created by RafaelT using Generative AI (Ollama, Gemma4, OpenClaw, Cline, Gemini, ChatGPT, and or Copilot)</p>
  </div>
<script>
const owner = "okinawapro";
const repo = "okinawapro.github.io";
const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/`;

const listEl = document.getElementById("list");
const statusEl = document.getElementById("status");

function makeLink(name, href) {
  const a = document.createElement('a');
  a.textContent = name.replace('.html','').replace(/[-_]/g,' ');
  a.href = href;
  a.target = '_blank';
  a.rel = 'noopener noreferrer';
  return a;
}

fetch(apiUrl)
  .then(res => res.json())
  .then(async items => {
    statusEl.textContent = '';

    // Show files in root (if any)
    const rootHtml = items.filter(i => i.type === 'file' && i.name.endsWith('.html') && i.name !== 'index.html');
    if (rootHtml.length > 0) {
      const details = document.createElement('details');
      const summary = document.createElement('summary');
      summary.textContent = 'Root';
      details.appendChild(summary);
      const ul = document.createElement('div');
      ul.className = 'dir-list';
      rootHtml.sort((a,b)=>a.name.localeCompare(b.name)).forEach(f => {
        ul.appendChild(makeLink(f.name, f.name));
      });
      details.appendChild(ul);
      listEl.appendChild(details);
    }

    // For each directory, fetch contents and list HTML files
    const dirs = items.filter(i => i.type === 'dir');
    for (const d of dirs) {
      try {
        const res = await fetch(apiUrl + encodeURIComponent(d.name));
        const contents = await res.json();
        const htmlFiles = (contents || []).filter(c => c.type === 'file' && c.name.endsWith('.html'));
        if (htmlFiles.length === 0) continue;

        const details = document.createElement('details');
        const summary = document.createElement('summary');
        summary.textContent = d.name;
        details.appendChild(summary);

        const ul = document.createElement('div');
        ul.className = 'dir-list';
        htmlFiles.sort((a,b)=>a.name.localeCompare(b.name)).forEach(f => {
          // link relative to site root
          const href = `${d.name}/${f.name}`;
          ul.appendChild(makeLink(f.name, href));
        });
        details.appendChild(ul);
        listEl.appendChild(details);
      } catch (err) {
        console.error('Failed to load directory', d.name, err);
      }
    }

    if (listEl.children.length === 0) {
      statusEl.textContent = 'No HTML pages found.';
    } else {
      statusEl.remove();
    }
  })
  .catch(err => {
    console.error(err);
    statusEl.textContent = "Failed to load page list.";
    statusEl.className = "error";
  });
</script>

</body>
</html>
