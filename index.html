<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Repository File Browser</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
        background: #f5f5f5;
    }

    #searchBox {
        width: 100%;
        padding: 12px;
        font-size: 18px;
        margin-bottom: 20px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    .section {
        margin-bottom: 15px;
        border-radius: 8px;
        padding: 10px;
        color: #fff;
    }

    .section h2 {
        cursor: pointer;
        margin: 0;
        padding: 10px;
        font-size: 20px;
    }

    .file-list {
        display: none;
        padding: 10px;
        background: rgba(255,255,255,0.15);
        border-radius: 6px;
        margin-top: 10px;
    }

    .file-item {
        margin: 5px 0;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .file-item img {
        width: 20px;
        height: 20px;
    }

    a {
        color: #fff;
        text-decoration: underline;
    }
</style>
</head>
<body>

<h1>Repository File Browser</h1>

<input id="searchBox" type="text" placeholder="Search directories or files...">

<div id="container"></div>

<script>
const colors = [
    "#4a90e2", "#50e3c2", "#9013fe", "#f5a623",
    "#d0021b", "#7ed321", "#417505", "#b8e986"
];

const icons = {
    "folder": "https://img.icons8.com/fluency/48/folder-invoices.png",
    "html": "https://img.icons8.com/color/48/html-5.png",
    "css": "https://img.icons8.com/color/48/css3.png",
    "js": "https://img.icons8.com/color/48/javascript.png",
    "png": "https://img.icons8.com/color/48/png.png",
    "jpg": "https://img.icons8.com/color/48/jpg.png",
    "jpeg": "https://img.icons8.com/color/48/jpg.png",
    "gif": "https://img.icons8.com/color/48/gif.png",
    "svg": "https://img.icons8.com/color/48/svg.png",
    "md": "https://img.icons8.com/fluency/48/markdown.png",
    "default": "https://img.icons8.com/fluency/48/document.png"
};

function getIcon(filename, isDir) {
    if (isDir) return icons.folder;
    const ext = filename.split(".").pop().toLowerCase();
    return icons[ext] || icons.default;
}

async function fetchDirectory(path, container, depth = 0) {
    const api = `https://api.github.com/repos/okinawapro/okinawapro.github.io/contents`;
    const response = await fetch(api);
    const items = await response.json();

    const directories = items.filter(i => i.type === "dir");
    const files = items.filter(i => i.type === "file");

    let colorIndex = depth % colors.length;

    const section = document.createElement("div");
    section.className = "section";
    section.style.background = colors[colorIndex];

    const header = document.createElement("h2");
    header.textContent = path || "root";

    const fileList = document.createElement("div");
    fileList.className = "file-list";

    header.addEventListener("click", () => {
        fileList.style.display = fileList.style.display === "none" ? "block" : "none";
    });

    section.appendChild(header);
    section.appendChild(fileList);
    container.appendChild(section);

    // Add files
    files.forEach(file => {
        const item = document.createElement("div");
        item.className = "file-item";

        const icon = document.createElement("img");
        icon.src = getIcon(file.name, false);

        const link = document.createElement("a");
        link.href = file.html_url;
        link.target = "_blank";
        link.textContent = file.name;

        item.appendChild(icon);
        item.appendChild(link);
        fileList.appendChild(item);
    });

    // Recursively add directories
    for (const dir of directories) {
        const item = document.createElement("div");
        item.className = "file-item";

        const icon = document.createElement("img");
        icon.src = getIcon(dir.name, true);

        const label = document.createElement("span");
        label.textContent = dir.name;

        item.appendChild(icon);
        item.appendChild(label);
        fileList.appendChild(item);

        await fetchDirectory(dir.path, fileList, depth + 1);
    }
}

async function init() {
    const container = document.getElementById("container");
    await fetchDirectory("", container);
}

document.getElementById("searchBox").addEventListener("input", function () {
    const query = this.value.toLowerCase();
    const sections = document.querySelectorAll(".section");

    sections.forEach(section => {
        const text = section.querySelector("h2").textContent.toLowerCase();
        const files = section.querySelectorAll(".file-item");

        let match = text.includes(query);

        files.forEach(file => {
            const fileText = file.textContent.toLowerCase();
            if (fileText.includes(query)) match = true;
        });

        section.style.display = match ? "block" : "none";
    });
});

init();
</script>

</body>
</html>
